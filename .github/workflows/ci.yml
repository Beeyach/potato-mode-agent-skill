name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.x"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python-version }}
      - name: Compile
        run: python -m py_compile skill/potato-mode/scripts/potato.py install.py
      - name: Test
        run: python -m unittest discover -s tests -v
      - name: Probe
        run: python skill/potato-mode/scripts/potato.py probe --path . --json
