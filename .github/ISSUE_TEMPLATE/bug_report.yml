name: Bug report
description: Report incorrect detection, installation, or command behavior
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Remove usernames, tokens, private paths, and unrelated process details before submitting.
  - type: input
    id: version
    attributes:
      label: Potato Mode version
      placeholder: v0.1.0
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Operating system
      options: [Windows, macOS, Linux, Other]
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Include the command and redacted output.
    validations:
      required: true
